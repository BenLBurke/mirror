<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror ✦ Home</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --surface: #181614;
    --border: #2a2622;
    --accent: #c9a96e;
    --accent-soft: rgba(201,169,110,0.12);
    --text: #e8e0d5;
    --muted: #7a7168;
    --danger: #c46b5a;
    --danger-soft: rgba(196,107,90,0.12);
    --success: #6b9e7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  input[type="text"], input[type="password"], input[type="url"], textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 1px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus { border-color: var(--accent); }

  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 1px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0e0d;
  }
  .btn-primary:hover { background: #d4b87a; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 0.72rem;
    padding: 0.5rem 1rem;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid transparent;
    font-size: 0.7rem;
    padding: 0.4rem 0.8rem;
  }
  .btn-danger:hover { border-color: var(--danger); }

  .auth-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 1.2rem;
    text-align: center;
    line-height: 1.6;
  }
  .auth-hint a { color: var(--accent); text-decoration: none; }
  .auth-hint a:hover { text-decoration: underline; }

  .error-msg {
    background: var(--danger-soft);
    border: 1px solid var(--danger);
    color: var(--danger);
    font-size: 0.8rem;
    padding: 0.6rem 0.9rem;
    border-radius: 1px;
    margin-top: 1rem;
    display: none;
  }

  /* ── APP SHELL ───────────────────────────────── */
  #app { display: none; min-height: 100vh; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .user-badge {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  /* ── TABS ────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 2.5rem;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 1rem 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.18s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PANELS ──────────────────────────────────── */
  .panel { display: none; padding: 2.5rem; }
  .panel.active { display: block; }

  /* ── PHOTOS ──────────────────────────────────── */
  .panel-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .panel-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 0.06em;
    line-height: 1;
  }

  .panel-count {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* Upload drop zone */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 2px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2.5rem;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    border: none;
    padding: 0;
  }

  .upload-icon {
    font-size: 2rem;
    margin-bottom: 0.75rem;
    display: block;
    color: var(--muted);
  }

  .upload-text {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Photo grid */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }

  .photo-card {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
    border-radius: 1px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    group: true;
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.35s ease;
    display: block;
  }

  .photo-card:hover img { transform: scale(1.04); }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15,14,13,0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .photo-card:hover .photo-overlay { opacity: 1; }

  .photo-name {
    font-size: 0.7rem;
    color: var(--text);
    letter-spacing: 0.08em;
    max-width: 90%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .photo-uploading {
    position: absolute;
    inset: 0;
    background: rgba(15,14,13,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── LIGHTBOX ────────────────────────────────── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border: 1px solid var(--border);
  }

  .lightbox-close {
    position: fixed;
    top: 1.5rem;
    right: 2rem;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.5rem;
    cursor: pointer;
    transition: color 0.18s;
    font-family: monospace;
  }
  .lightbox-close:hover { color: var(--text); }

  /* ── PHRASES ─────────────────────────────────── */
  .phrases-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
  }

  .phrase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.5rem;
  }

  .phrase-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }

  .phrase-category {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .phrase-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }

  .phrase-item input {
    flex: 1;
    font-size: 0.88rem;
    padding: 0.5rem 0.75rem;
  }

  .btn-icon {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .btn-icon:hover { color: var(--danger); border-color: var(--danger); }

  .add-phrase-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }

  .add-phrase-row input { flex: 1; }

  .btn-add {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--accent); color: #0f0e0d; }

  .save-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 1rem 2.5rem;
    display: none;
    align-items: center;
    justify-content: space-between;
    z-index: 200;
  }

  .save-bar.visible { display: flex; }

  .save-hint {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .unsaved-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.4rem;
  }

  /* ── SPINNER ─────────────────────────────────── */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(201,169,110,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ───────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.82rem;
    padding: 0.75rem 1.5rem;
    border-radius: 1px;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* ── EMPTY STATE ─────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; opacity: 0.4; }
  .empty-state p { font-size: 0.85rem; letter-spacing: 0.05em; }

  /* ── LOADING STATE ───────────────────────────── */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 4rem;
    color: var(--muted);
    font-size: 0.82rem;
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    header { padding: 1rem 1.2rem; }
    .tabs { padding: 0 1.2rem; }
    .panel { padding: 1.5rem 1.2rem; }
    .photo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem; }
    .phrases-grid { grid-template-columns: 1fr; }
    .save-bar { padding: 1rem 1.2rem; }
  }
</style>
</head>
<body>

<!-- ═══ APP ═══════════════════════════════════════════ -->
<div id="app">
  <header>
    <div class="header-title">✦ Mirror</div>
    <div class="header-right">
      <span class="user-badge" id="user-badge"></span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('photos', this)">Photos</button>
    <button class="tab" onclick="switchTab('phrases', this)">Phrases</button>
  </div>

  <!-- PHOTOS PANEL -->
  <div class="panel active" id="panel-photos">
    <div class="panel-header">
      <div>
        <div class="panel-heading">Photos</div>
        <div class="panel-count" id="photo-count"></div>
      </div>
    </div>

    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" multiple accept="image/*" onchange="handleFileSelect(event)">
      <span class="upload-icon">⊕</span>
      <div class="upload-text">Drop photos here or click to browse</div>
    </div>

    <div id="photo-grid" class="photo-grid">
      <div class="loading-state"><div class="spinner"></div> Loading photos…</div>
    </div>
  </div>

  <!-- PHRASES PANEL -->
  <div class="panel" id="panel-phrases">
    <div class="panel-header">
      <div>
        <div class="panel-heading">Phrases</div>
        <div class="panel-count">What shows on the mirror</div>
      </div>
      <button class="btn btn-ghost" onclick="reloadPhrases()">↺ Reload</button>
    </div>
    <div id="phrases-grid" class="phrases-grid">
      <div class="loading-state"><div class="spinner"></div> Loading phrases…</div>
    </div>
  </div>
</div>

<!-- SAVE BAR -->
<div class="save-bar" id="save-bar">
  <span class="save-hint"><span class="unsaved-dot"></span>Unsaved changes</span>
  <div style="display:flex;gap:0.75rem">
    <button class="btn btn-ghost" onclick="discardPhrases()">Discard</button>
    <button class="btn btn-primary" style="width:auto;margin:0" id="save-btn" onclick="savePhrases()">Save to Mirror</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════
// CONFIG — change these to match your repo
// ════════════════════════════════════════════════
const REPO_OWNER = 'BenLBurke';
const REPO_NAME  = 'mirror';
const BRANCH     = 'master';
const PHOTOS_DIR = 'photos';
const COMPLIMENTS_FILE = 'compliments.json';
const COMPLIMENTS_BRANCH = 'main'; // your compliments.json is on main

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const TOKEN = 'MIRROR_TOKEN_PLACEHOLDER'; // injected by build.sh
let photosData = []; // [{name, sha, downloadUrl}]
let phrasesData = {}; // parsed compliments object
let phrasesSha = '';   // sha for committing
let phrasesModified = false;

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadPhotos();
  loadPhrases();

  // Drag & drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) uploadFiles(files);
  });

  // Lightbox close on backdrop click
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  // ESC closes lightbox
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
});

// ════════════════════════════════════════════════
// GITHUB API HELPERS
// ════════════════════════════════════════════════
function ghFetch(url, options = {}) {
  return fetch(url, {
    ...options,
    headers: {
      'Authorization': `Bearer ${TOKEN}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(options.headers || {})
    }
  });
}

function ghApi(path, options = {}) {
  return ghFetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}${path}`, options);
}

// ════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
}

// ════════════════════════════════════════════════
// PHOTOS
// ════════════════════════════════════════════════
async function loadPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading photos…</div>';

  try {
    const res = await ghApi(`/contents/${PHOTOS_DIR}?ref=${BRANCH}`);
    if (!res.ok) {
      if (res.status === 404) {
        photosData = [];
        renderPhotos();
        return;
      }
      throw new Error('Could not load photos folder.');
    }
    const files = await res.json();
    photosData = files
      .filter(f => f.type === 'file' && /\.(jpe?g|png|gif|webp|bmp|svg)$/i.test(f.name))
      .map(f => ({ name: f.name, sha: f.sha, downloadUrl: f.download_url }));
    renderPhotos();
  } catch(e) {
    grid.innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
  }
}

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  const count = document.getElementById('photo-count');
  count.textContent = `${photosData.length} photo${photosData.length !== 1 ? 's' : ''}`;

  if (photosData.length === 0) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">◻</span><p>No photos yet. Upload some above.</p></div>';
    return;
  }

  grid.innerHTML = photosData.map((p, i) => `
    <div class="photo-card" id="photo-card-${i}">
      <img src="${p.downloadUrl}" alt="${p.name}" loading="lazy" onclick="openLightbox(${i})">
      <div class="photo-overlay">
        <div class="photo-name">${p.name}</div>
        <button class="btn btn-danger" onclick="event.stopPropagation(); deletePhoto(${i})">Delete</button>
      </div>
    </div>
  `).join('');
}

async function handleFileSelect(event) {
  const files = [...event.target.files];
  if (files.length) await uploadFiles(files);
  event.target.value = '';
}

async function uploadFiles(files) {
  for (const file of files) {
    await uploadSingleFile(file);
  }
}

async function uploadSingleFile(file) {
  const sanitized = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `${PHOTOS_DIR}/${sanitized}`;

  // Add placeholder card
  const placeholderId = `upload-${Date.now()}`;
  const grid = document.getElementById('photo-grid');
  const placeholder = document.createElement('div');
  placeholder.className = 'photo-card';
  placeholder.id = placeholderId;
  placeholder.innerHTML = `<div class="photo-uploading"><div class="spinner"></div></div>`;
  grid.insertBefore(placeholder, grid.firstChild);

  try {
    const b64 = await fileToBase64(file);

    // Check if file already exists (need sha for update)
    let existingSha = null;
    const check = await ghApi(`/contents/${path}?ref=${BRANCH}`);
    if (check.ok) {
      const existing = await check.json();
      existingSha = existing.sha;
    }

    const body = {
      message: `Add photo: ${sanitized}`,
      content: b64,
      branch: BRANCH,
    };
    if (existingSha) body.sha = existingSha;

    const res = await ghApi(`/contents/${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Upload failed.');
    }

    placeholder.remove();
    toast(`Uploaded ${sanitized}`, 'success');
    await loadPhotos();
  } catch(e) {
    placeholder.remove();
    toast(e.message || 'Upload failed', 'error');
  }
}

async function deletePhoto(index) {
  const photo = photosData[index];
  if (!confirm(`Delete "${photo.name}"? This cannot be undone.`)) return;

  const card = document.getElementById(`photo-card-${index}`);
  card.style.opacity = '0.4';
  card.style.pointerEvents = 'none';

  try {
    const res = await ghApi(`/contents/${PHOTOS_DIR}/${photo.name}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `Remove photo: ${photo.name}`,
        sha: photo.sha,
        branch: BRANCH
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Delete failed.');
    }

    toast(`Deleted ${photo.name}`, 'success');
    await loadPhotos();
  } catch(e) {
    card.style.opacity = '1';
    card.style.pointerEvents = 'auto';
    toast(e.message || 'Delete failed', 'error');
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

}

// ════════════════════════════════════════════════
// PHRASES
// ════════════════════════════════════════════════
const CATEGORY_LABELS = {
  morning: '☀️ Morning',
  afternoon: '🌤 Afternoon',
  evening: '🌙 Evening',
  'weather:clear': '☀️ Clear Skies',
  'weather:rain': '🌧 Rain',
  'weather:snow': '❄️ Snow',
  'weather:cloudy': '☁️ Cloudy',
  'weather:thunderstorm': '⛈ Thunderstorm',
};

async function loadPhrases() {
  const grid = document.getElementById('phrases-grid');
  grid.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading phrases…</div>';

  try {
    const res = await ghApi(`/contents/${COMPLIMENTS_FILE}?ref=${COMPLIMENTS_BRANCH}`);
    if (!res.ok) throw new Error('Could not load compliments.json');
    const data = await res.json();
    phrasesSha = data.sha;

    // Decode base64 content
    const raw = atob(data.content.replace(/\n/g, ''));

    // The file uses JS object syntax (not strict JSON) — parse permissively
    phrasesData = parseCompliments(raw);
    phrasesModified = false;
    renderPhrases();
  } catch(e) {
    grid.innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
  }
}

function parseCompliments(raw) {
  // Extract the compliments object from the MagicMirror config format
  const match = raw.match(/compliments:\s*(\{[\s\S]*\})\s*\}\s*\}\s*\}?\s*$/);
  if (!match) {
    // Try parsing it as a plain JSON object
    try { return JSON.parse(raw); } catch(e) {}
    // Try to extract just the inner compliments block
    const inner = raw.match(/compliments:\s*\{([\s\S]+)\}\s*\}/);
    if (inner) {
      try { return JSON.parse(`{${inner[1]}}`); } catch(e2) {}
    }
    throw new Error('Could not parse compliments.json — unexpected format.');
  }
  try {
    return JSON.parse(match[1]);
  } catch(e) {
    // Attempt lenient parse for JS object (unquoted keys)
    const fixed = match[1]
      .replace(/(\w[\w:]*)(\s*):/g, '"$1"$2:')
      .replace(/,\s*([\}\]])/g, '$1');
    return JSON.parse(fixed);
  }
}

function renderPhrases() {
  const grid = document.getElementById('phrases-grid');
  grid.innerHTML = '';

  const categories = Object.keys(phrasesData);
  if (categories.length === 0) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">◻</span><p>No phrases found.</p></div>';
    return;
  }

  categories.forEach(cat => {
    const label = CATEGORY_LABELS[cat] || cat;
    const phrases = phrasesData[cat] || [];

    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = `
      <div class="phrase-card-header">
        <div class="phrase-category">${label}</div>
        <span style="font-size:0.7rem;color:var(--muted)">${phrases.length} phrase${phrases.length !== 1 ? 's' : ''}</span>
      </div>
      <div id="phrases-${cat}">
        ${phrases.map((p, i) => phraseItemHTML(cat, i, p)).join('')}
      </div>
      <div class="add-phrase-row">
        <input type="text" id="new-${cat}" placeholder="Add a phrase…" onkeydown="if(event.key==='Enter') addPhrase('${cat}')">
        <button class="btn-add" onclick="addPhrase('${cat}')">Add</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function phraseItemHTML(cat, index, value) {
  const escapedCat = cat.replace(/:/g, '\\:');
  return `
    <div class="phrase-item" id="phrase-item-${cat}-${index}">
      <input type="text" value="${escapeHTML(value)}" 
             oninput="updatePhrase('${cat}', ${index}, this.value)">
      <button class="btn-icon" onclick="removePhrase('${cat}', ${index})" title="Remove">✕</button>
    </div>
  `;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updatePhrase(cat, index, value) {
  phrasesData[cat][index] = value;
  markModified();
}

function removePhrase(cat, index) {
  phrasesData[cat].splice(index, 1);
  markModified();
  renderPhrases();
}

function addPhrase(cat) {
  const input = document.getElementById(`new-${cat}`);
  const val = input.value.trim();
  if (!val) return;
  phrasesData[cat].push(val);
  input.value = '';
  markModified();
  renderPhrases();
  // Re-focus the new phrase input
  setTimeout(() => {
    const el = document.getElementById(`new-${cat}`);
    if (el) el.focus();
  }, 50);
}

function markModified() {
  phrasesModified = true;
  document.getElementById('save-bar').classList.add('visible');
}

function discardPhrases() {
  phrasesModified = false;
  document.getElementById('save-bar').classList.remove('visible');
  loadPhrases();
}

async function savePhrases() {
  if (!phrasesModified) return;

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    // Rebuild the full MagicMirror config format
    const complimentsJson = JSON.stringify(phrasesData, null, 2);
    const fullContent = `{\n  module: "compliments",\n  position: "lower_third",\n  config: {\n    updateInterval: 30000,\n    remoteFile: null,\n    fadeSpeed: 4000,\n    compliments: ${complimentsJson}\n  }\n}`;

    const encoded = btoa(unescape(encodeURIComponent(fullContent)));

    const res = await ghApi(`/contents/${COMPLIMENTS_FILE}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Update compliments via Mirror Dashboard',
        content: encoded,
        sha: phrasesSha,
        branch: COMPLIMENTS_BRANCH
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Save failed.');
    }

    const updated = await res.json();
    phrasesSha = updated.content.sha;
    phrasesModified = false;
    document.getElementById('save-bar').classList.remove('visible');
    toast('Phrases saved to mirror ✦', 'success');
  } catch(e) {
    toast(e.message || 'Save failed', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save to Mirror';
  }
}

async function reloadPhrases() {
  if (phrasesModified && !confirm('Discard unsaved changes and reload?')) return;
  document.getElementById('save-bar').classList.remove('visible');
  await loadPhrases();
  toast('Phrases reloaded', '');
}

// ════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}
</script>
